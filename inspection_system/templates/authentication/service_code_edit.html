{% extends 'base.html' %}

{% block title %}Edit Service Code | Inspection Tool{% endblock %}

{% block content %}
<div class="container-fluid" style="max-width: 600px;">
    <div style="margin-bottom: 2rem;">
        <h1 style="font-size: 1.75rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.25rem;">Edit Service
            Code</h1>
        <p style="color: var(--text-secondary);">Update service code details.</p>
    </div>

    <div class="card" style="padding: 2rem;">
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem;">
                <label
                    style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem;">Code</label>
                <input type="text" name="code" value="{{ service_code.code }}" required placeholder="e.g. K, A1"
                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--surface-border); border-radius: var(--radius-md);">
            </div>
            <div style="margin-bottom: 2rem;">
                <label
                    style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem;">Description</label>
                <textarea name="description" rows="4" placeholder="Description..."
                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--surface-border); border-radius: var(--radius-md);">{{ service_code.description }}</textarea>
            </div>

            <div style="margin-bottom: 2rem;">
                <label
                    style="display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem;">Project</label>
                <select name="project_id"
                    style="width: 100%; padding: 0.75rem; border: 1px solid var(--surface-border); border-radius: var(--radius-md);">
                    <option value="">-- No Project (Global) --</option>
                    {% for p in projects %}
                    <option value="{{ p.id }}" {% if service_code.project and service_code.project.id == p.id %}selected{% endif %}>{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <a href="{% url 'authentication:service_code_list' %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Code</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
