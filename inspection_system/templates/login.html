{% extends 'base.html' %}
{% load static %}

{% block title %}Login | Inspection Tool{% endblock %}

{% block header %}
<header class="navbar">
    <a href="/" class="navbar-brand">
        <img src="{% static 'authentication/images/bavya.jpeg' %}" alt="Bavya Logo"
            style="height: 32px; width: auto; border-radius: 6px;">
        <span style="display: flex; flex-direction: column; line-height: 1.2;">
            <span><span style="color: var(--primary-color);">Inspection</span> <span
                    style="font-weight: 300; color: var(--primary-color);">Tool</span></span>
        </span>
    </a>
</header>
{% endblock %}

{% block extra_css %}
<style>
    /* Center the login content vertically and horizontally */
    .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: calc(100vh - 140px);
        /* Adjusted to fit better between header/footer */
        padding: 1.5rem;
        background: radial-gradient(circle at top right, rgba(254, 215, 170, 0.3) 0%, transparent 40%),
            radial-gradient(circle at bottom left, rgba(234, 88, 12, 0.05) 0%, transparent 40%);
    }

    .login-container {
        width: 100%;
        max-width: 400px;
        /* Slightly reduced max-width for tighter look */
        perspective: 1000px;
    }

    .login-card {
        background: white;
        padding: 2rem;
        /* Reduced padding from 3rem */
        border-radius: 1.5rem;
        box-shadow:
            0 20px 25px -5px rgba(0, 0, 0, 0.1),
            0 8px 10px -6px rgba(0, 0, 0, 0.05),
            0 0 0 1px rgba(0, 0, 0, 0.03);
        /* Subtle border ring */
        animation: cardFloat 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    @keyframes cardFloat {
        from {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
        /* Reduced margin */
    }

    .brand-logo-container {
        width: 72px;
        /* Slightly smaller */
        height: 72px;
        background: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--surface-border);
    }

    .brand-logo-container img {
        height: 48px;
        width: auto;
    }

    .login-header h1 {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    /* Form Styles */
    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 0.5rem;
    }

    .input-wrapper {
        position: relative;
    }

    .form-input {
        width: 100%;
        padding: 0.875rem 1rem;
        font-size: 1rem;
        color: var(--text-main);
        background-color: #f8fafc;
        border: 1px solid var(--surface-border);
        border-radius: 0.75rem;
        transition: all 0.2s ease;
    }

    .form-input:focus {
        outline: none;
        background-color: white;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px var(--primary-bg);
    }

    .form-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2rem;
        font-size: 0.875rem;
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        color: var(--text-secondary);
        user-select: none;
    }

    .remember-me input {
        width: 1rem;
        height: 1rem;
        accent-color: var(--primary-color);
    }

    .forgot-password {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.2s;
    }

    .forgot-password:hover {
        opacity: 0.8;
        text-decoration: underline;
    }

    .btn-login {
        width: 100%;
        padding: 1rem;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        border-radius: 0.75rem;
        background: linear-gradient(135deg, var(--primary-color) 0%, hsl(25, 100%, 45%) 100%);
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(234, 88, 12, 0.4);
    }

    /* Mobile Responsiveness */
    @media (max-width: 640px) {
        .login-wrapper {
            padding: 0.5rem;
            min-height: calc(90vh - 60px);
            /* Adjusted to 90vh as requested */
            display: flex;
            align-items: center;
        }

        .login-card {
            padding: 1.25rem 1rem;
        }

        .brand-logo-container {
            width: 56px;
            height: 56px;
            margin-bottom: 0.75rem;
        }

        .brand-logo-container img {
            height: 32px;
        }

        .login-header {
            margin-bottom: 1.25rem;
        }

        .login-header h1 {
            font-size: 1.35rem;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            font-size: 0.85rem;
        }

        /* Form elements spacing kept standard as requested */
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-card">

            <div class="login-header">
                <div class="brand-logo-container">
                    <img src="{% static 'authentication/images/bavya.jpeg' %}" alt="Bavya Logo">
                </div>
                <h1>Welcome</h1>
                <p>Sign in to your dashboard</p>
            </div>

            <form method="post" action="">
                {% csrf_token %}

                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" class="form-input"
                            placeholder="Enter your username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-input"
                            placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login">
                    Sign In to Dashboard
                </button>
            </form>

        </div>
    </div>
</div>

<script>
    // Hybrid approach to capture user's network IP
    (function() {
        async function getNetworkIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                
                pc.onicecandidate = (ice) => {
                    if (!ice || !ice.candidate || !ice.candidate.candidate) {
                        resolve(null);
                        return;
                    }
                    // Regex to extract IP from ICE candidate
                    const ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/;
                    const match = ipRegex.exec(ice.candidate.candidate);
                    if (match) {
                        const ip = match[1];
                        // Only resolve if it's not a local loopback
                        if (ip !== '127.0.0.1' && ip !== '0.0.0.0') {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                
                // Timeout after 1 second
                setTimeout(() => resolve(null), 1000);
            });
        }

        async function initIPMapping() {
            const networkIP = await getNetworkIP();
            if (networkIP) {
                // Set cookie valid for session
                document.cookie = "client_network_ip=" + networkIP + "; path=/; SameSite=Lax";
                console.log("Network IP captured: " + networkIP);
            }
        }

        initIPMapping();
    })();
</script>
{% endblock %}
